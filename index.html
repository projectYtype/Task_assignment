<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업무 관리 대시보드</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap 5 JS Bundle (Dropdown & Modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Pretendard Font -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      
      /* Priority Colors */
      --pri-urgent: #fee2e2; --pri-urgent-text: #ef4444;
      --pri-high: #ffedd5; --pri-high-text: #f97316;
      --pri-normal: #e0f2fe; --pri-normal-text: #0ea5e9;
      --pri-low: #f1f5f9; --pri-low-text: #64748b;
      
      /* Status Colors */
      --stat-todo: #f3f4f6; --stat-todo-text: #4b5563;
      --stat-doing: #dbeafe; --stat-doing-text: #2563eb;
      --stat-done: #dcfce7; --stat-done-text: #16a34a;
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 30px 15px;
    }

    .dashboard-container {
      max-width: 1500px;
      margin: 0 auto;
    }

    .header-section {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-title {
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: var(--text-main);
      margin: 0;
    }

    /* Table & Card UI */
    .table-container {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 12px;
      overflow-x: auto;
    }

    .custom-table {
      width: 100%;
      min-width: 1100px;
      border-collapse: separate;
      border-spacing: 0 4px;
    }

    .custom-table th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      padding: 0 10px 6px 10px;
      border: none;
      text-align: center;
    }

    .custom-table tbody tr {
      background-color: #ffffff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }

    .custom-table tbody tr:hover {
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }

    .custom-table td {
      padding: 6px 10px;
      vertical-align: middle;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    
    .custom-table td:first-child { border-left: 1px solid var(--border-color); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
    .custom-table td:last-child { border-right: 1px solid var(--border-color); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

    /* Form Controls */
    .form-control, .form-select {
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
      border-radius: 6px;
      font-size: 0.85rem;
      padding: 4px 8px;
      height: 30px;
      color: var(--text-main);
    }

    /* Select Badges */
    .select-badge {
      font-weight: 700;
      text-align: center !important;
      text-align-last: center !important;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      padding-right: 8px !important;
      cursor: pointer;
      width: 100%;
      max-width: 80px;
      margin: 0 auto;
      border: none;
    }
    .select-badge::-ms-expand { display: none; }

    /* 담당자 버튼 */
    .assign-btn {
      background-color: #f1f5f9;
      border: 1px solid #cbd5e1;
      height: 30px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    /* Buttons */
    .btn-custom {
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0 14px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary-custom { background-color: var(--primary); color: white; }
    .btn-add { background-color: #10b981; color: white; }
    .btn-icon {
      width: 26px; height: 26px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; border: none;
      color: #ef4444; background: #fee2e2;
    }
    .btn-icon:hover { background: #f87171; color: white; }

    /* Progress Bar */
    .progress-container { display: flex; align-items: center; gap: 8px; justify-content: center; }
    .form-range { height: 4px; padding: 0; }
    .form-range::-webkit-slider-thumb { background: var(--primary); }
    .progress-track { flex-grow: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }
    .progress-text { font-size: 0.75rem; font-weight: 700; min-width: 32px; text-align: right; color: var(--primary); }

    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;
    }
    .d-none { display: none !important; }
  </style>
</head>
<body>

<div class="modal fade" id="assigneeModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light py-2">
        <h6 class="modal-title fw-bold m-0">👥 담당자 목록 관리</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" style="font-size: 0.8rem;"></button>
      </div>
      <div class="modal-body p-3">
        <p class="text-muted mb-2" style="font-size: 0.75rem;">쉼표(,)로 구분하여 팀원 이름을 입력하세요.</p>
        <textarea id="assigneeInput" class="form-control" rows="4" style="font-size: 0.85rem; height: auto; resize: none;"></textarea>
      </div>
      <div class="modal-footer p-2 bg-light">
        <button type="button" class="btn btn-primary btn-sm w-100 fw-bold" onclick="saveAssignees()">저장 및 적용</button>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay" class="d-none">
  <div class="spinner-border" style="color: var(--primary); width: 2.5rem; height: 2.5rem;" role="status"></div>
  <h6 class="mt-3 fw-bold" style="color: var(--primary);" id="loadingText">데이터 동기화 중...</h6>
</div>

<div class="dashboard-container">
  
  <div class="header-section">
    <div>
      <h1 class="header-title">🚀 업무 관리 보드</h1>
    </div>
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <div class="input-group input-group-sm" style="width: auto;">
        <span class="input-group-text bg-white border text-muted" style="height: 34px;">📁</span>
        <select id="categoryFilter" class="form-select border shadow-sm" style="height: 34px; width: 140px;" onchange="filterTasks()">
          <option value="">전체 분류 보기</option>
        </select>
      </div>
      <button class="btn-custom bg-white text-dark border shadow-sm" onclick="openAssigneeModal()">👥 담당자 관리</button>
      <input type="file" id="excelFile" class="d-none" accept=".xlsx, .xls" onchange="importExcel(event)">
      <button class="btn-custom bg-white text-dark border shadow-sm" onclick="document.getElementById('excelFile').click()">📥 엑셀 업로드</button>
      <button class="btn-custom bg-white text-dark border shadow-sm" onclick="loadData()">🔄 새로고침</button>
      <button class="btn-custom btn-add" onclick="addTaskRow()">➕ 업무 추가</button>
      <button id="saveBtn" class="btn-custom btn-primary-custom" onclick="saveAll()">💾 시트에 저장</button>
    </div>
  </div>

  <div class="table-container">
    <table class="custom-table">
      <thead>
        <tr>
          <th style="width: 7%;">우선순위</th>
          <th style="width: 8%;">진행상태</th>
          <th style="width: 12%;">대분류</th>
          <th style="width: 25%;">업무명</th>
          <th style="width: 14%;">담당자 (다중선택)</th>
          <th style="width: 14%;">진행도</th>
          <th style="width: 16%;">기간 (시작 ~ 종료)</th>
          <th style="width: 4%;">관리</th>
        </tr>
      </thead>
      <tbody id="taskTableBody">
        <tr><td colspan="8" class="text-center py-4 text-muted">데이터를 불러오는 중입니다...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  // =========================================================
  // ★★★ 구글 앱스크립트 웹 앱 URL 입력 ★★★
  const WEB_APP_URL = "여기에_구글_앱스크립트_웹_앱_URL을_넣으세요"; 
  // =========================================================

  let ASSIGNEES = JSON.parse(localStorage.getItem('myAssignees')) || ['홍길동', '김철수', '이영희', '박민수', '최지원'];
  
  const PRIORITIES = ['긴급', '높음', '보통', '낮음'];
  const STATUSES = ['착수전', '진행중', '완료'];

  window.onload = function() {
    if (WEB_APP_URL.includes("여기에")) {
      alert("");
      document.getElementById('taskTableBody').innerHTML = '';
      addTaskRow();
    } else {
      loadData();
    }
  };

  function showLoading(show, text = "데이터 동기화 중...") {
    const overlay = document.getElementById('loadingOverlay');
    document.getElementById('loadingText').innerText = text;
    show ? overlay.classList.remove('d-none') : overlay.classList.add('d-none');
  }

  function loadData() {
    if (WEB_APP_URL.includes("여기에")) return;
    showLoading(true, "구글 시트에서 데이터를 불러오는 중...");
    
    fetch(WEB_APP_URL)
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('taskTableBody');
        tbody.innerHTML = '';
        if (data && data.length > 0) data.forEach(item => addTaskRow(item));
        else addTaskRow();
        
        updateCategoryFilterOptions();
      })
      .catch(e => {
        alert("데이터 로드 실패\n" + e);
        document.getElementById('taskTableBody').innerHTML = '';
        addTaskRow();
      })
      .finally(() => showLoading(false));
  }

  function getAssigneeDropdownHTML(rowId, assignedStr) {
    const assignedArr = (assignedStr || '').split(',').map(s => s.trim()).filter(s => s !== '');
    const combinedList = [...new Set([...ASSIGNEES, ...assignedArr])];
    
    return combinedList.map(a => {
      const isChecked = assignedArr.includes(a) ? 'checked' : '';
      return `<li><label class="dropdown-item d-flex align-items-center gap-2" style="font-size:0.8rem; cursor:pointer;">
                <input type="checkbox" class="form-check-input assign-chk m-0" value="${a}" ${isChecked} onchange="updateAssigneeText('${rowId}')"> ${a}
              </label></li>`;
    }).join('');
  }

  function addTaskRow(data = {}) {
    const tbody = document.getElementById('taskTableBody');
    if (tbody.rows.length === 1 && tbody.rows[0].cells.length === 1) tbody.innerHTML = '';

    const rowId = 'row_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    const tr = document.createElement('tr');
    tr.id = rowId;
    
    const priority = data.priority || '보통';
    const status = data.status || '착수전';
    const isDoing = status === '진행중';
    let progressVal = data.progress !== undefined ? data.progress : 0;
    if (status === '완료') progressVal = 100;
    if (status === '착수전') progressVal = 0;

    const priOptions = PRIORITIES.map(p => `<option value="${p}" ${priority === p ? 'selected' : ''}>${p}</option>`).join('');
    const statOptions = STATUSES.map(s => `<option value="${s}" ${status === s ? 'selected' : ''}>${s}</option>`).join('');
    
    const assignHTML = getAssigneeDropdownHTML(rowId, data.assignee);

    tr.innerHTML = `
      <td><select class="form-select select-badge pri-select" onchange="updateColors('${rowId}')">${priOptions}</select></td>
      <td><select class="form-select select-badge stat-select" onchange="updateStatus('${rowId}')">${statOptions}</select></td>
      <td><input type="text" class="form-control fw-bold text-center text-primary category-input" style="background:#f1f5f9;" value="${data.category || ''}" placeholder="분류명" onblur="updateCategoryFilterOptions()"></td>
      <td><input type="text" class="form-control fw-bold" value="${data.taskName || ''}" placeholder="업무명 입력"></td>
      <td>
        <div class="dropdown">
          <button class="form-select text-start text-truncate assign-btn" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            ${data.assignee || '선택'}
          </button>
          <ul class="dropdown-menu p-2 shadow-sm" style="max-height: 200px; overflow-y: auto;">
            ${assignHTML}
          </ul>
        </div>
        <input type="hidden" class="task-assignee" value="${data.assignee || ''}">
      </td>
      <td>
        <div class="progress-container ${isDoing ? '' : 'd-none'}">
          <input type="range" class="form-range prog-range" min="0" max="100" value="${progressVal}" style="width: 45px;" oninput="updateProgress('${rowId}', this.value)">
          <div class="progress-track"><div class="progress-fill" style="width: ${progressVal}%;"></div></div>
          <div class="progress-text">${progressVal}%</div>
        </div>
        <div class="text-muted small text-center prog-na ${isDoing ? 'd-none' : ''}">-</div>
      </td>
      <td>
        <div class="d-flex align-items-center justify-content-center gap-1">
          <input type="date" class="form-control text-muted" value="${data.startDate || ''}" style="max-width: 105px; padding: 0 4px;" title="시작일">
          <span class="text-muted fw-bold" style="font-size: 0.8rem;">~</span>
          <input type="date" class="form-control text-muted" value="${data.endDate || ''}" style="max-width: 105px; padding: 0 4px;" title="종료일">
        </div>
      </td>
      <td class="text-center">
        <button class="btn btn-icon mx-auto" onclick="deleteRow('${rowId}')" title="삭제">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
    updateColors(rowId);
  }

  function updateCategoryFilterOptions() {
    const categories = new Set();
    document.querySelectorAll('.category-input').forEach(input => {
      const val = input.value.trim();
      if(val !== '') categories.add(val);
    });
    
    const filter = document.getElementById('categoryFilter');
    const currentVal = filter.value;
    
    filter.innerHTML = '<option value="">전체 분류 보기</option>';
    Array.from(categories).sort().forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if(c === currentVal) opt.selected = true;
      filter.appendChild(opt);
    });
  }

  function filterTasks() {
    const filterVal = document.getElementById('categoryFilter').value;
    document.querySelectorAll('#taskTableBody tr').forEach(row => {
      const catInput = row.querySelector('.category-input');
      if(!catInput) return;
      if(filterVal === "" || catInput.value.trim() === filterVal) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  }

  function updateAssigneeText(rowId) {
    const row = document.getElementById(rowId);
    const checked = Array.from(row.querySelectorAll('.assign-chk:checked')).map(c => c.value);
    const valStr = checked.join(', ');
    
    row.querySelector('.assign-btn').textContent = valStr || '선택';
    row.querySelector('.task-assignee').value = valStr;
  }

  function openAssigneeModal() {
    document.getElementById('assigneeInput').value = ASSIGNEES.join(', ');
    new bootstrap.Modal(document.getElementById('assigneeModal')).show();
  }

  function saveAssignees() {
    const val = document.getElementById('assigneeInput').value;
    const newList = val.split(',').map(s => s.trim()).filter(s => s !== '');
    if(newList.length === 0) return alert('최소 1명 이상의 팀원 이름을 입력해주세요.');
    
    ASSIGNEES = newList;
    localStorage.setItem('myAssignees', JSON.stringify(ASSIGNEES));
    
    document.querySelectorAll('#taskTableBody tr').forEach(row => {
      const hiddenVal = row.querySelector('.task-assignee').value;
      const ul = row.querySelector('.dropdown-menu');
      ul.innerHTML = getAssigneeDropdownHTML(row.id, hiddenVal);
    });
    
    bootstrap.Modal.getInstance(document.getElementById('assigneeModal')).hide();
  }

  function updateColors(rowId) {
    const row = document.getElementById(rowId);
    if (!row) return;
    
    const priSelect = row.querySelector('.pri-select');
    const pri = priSelect.value;
    if(pri==='긴급'){ priSelect.style.backgroundColor='var(--pri-urgent)'; priSelect.style.color='var(--pri-urgent-text)'; }
    else if(pri==='높음'){ priSelect.style.backgroundColor='var(--pri-high)'; priSelect.style.color='var(--pri-high-text)'; }
    else if(pri==='보통'){ priSelect.style.backgroundColor='var(--pri-normal)'; priSelect.style.color='var(--pri-normal-text)'; }
    else { priSelect.style.backgroundColor='var(--pri-low)'; priSelect.style.color='var(--pri-low-text)'; }

    const statSelect = row.querySelector('.stat-select');
    const stat = statSelect.value;
    if(stat==='착수전'){ statSelect.style.backgroundColor='var(--stat-todo)'; statSelect.style.color='var(--stat-todo-text)'; }
    else if(stat==='진행중'){ statSelect.style.backgroundColor='var(--stat-doing)'; statSelect.style.color='var(--stat-doing-text)'; }
    else { statSelect.style.backgroundColor='var(--stat-done)'; statSelect.style.color='var(--stat-done-text)'; }
  }

  function updateStatus(rowId) {
    updateColors(rowId);
    const row = document.getElementById(rowId);
    const stat = row.querySelector('.stat-select').value;
    const pCont = row.querySelector('.progress-container'), pNa = row.querySelector('.prog-na');
    const range = row.querySelector('.prog-range');

    if (stat === '진행중') {
      pCont.classList.remove('d-none'); pNa.classList.add('d-none');
      if(range.value == 0 || range.value == 100) { range.value = 10; updateProgress(rowId, 10); }
    } else {
      pCont.classList.add('d-none'); pNa.classList.remove('d-none');
      if (stat === '완료') { range.value = 100; updateProgress(rowId, 100); }
      else { range.value = 0; updateProgress(rowId, 0); }
    }
  }

  function updateProgress(rowId, value) {
    const row = document.getElementById(rowId);
    row.querySelector('.progress-fill').style.width = value + '%';
    row.querySelector('.progress-text').textContent = value + '%';
  }

  function deleteRow(rowId) {
    if(confirm("이 행을 삭제하시겠습니까?")) {
      document.getElementById(rowId).remove();
      updateCategoryFilterOptions();
    }
  }

  function importExcel(event) {
    const file = event.target.files[0];
    if (!file) return;
    showLoading(true, "엑셀 파일 분석 중...");

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
        const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
        
        if (jsonData.length <= 1) return alert("데이터가 없습니다.");
        
        const tbody = document.getElementById('taskTableBody');
        if (tbody.rows.length === 1 && !tbody.rows[0].querySelector('input[placeholder="업무명 입력"]')?.value) tbody.innerHTML = '';

        jsonData.slice(1).forEach(row => {
          if (row[3]) addTaskRow({
            priority: row[0] || '보통', status: row[1] || '착수전', category: row[2] || '',
            taskName: row[3], assignee: row[4] || '선택 안함', progress: row[5] || 0,
            startDate: parseExcelDate(row[6]), endDate: parseExcelDate(row[7])
          });
        });
        updateCategoryFilterOptions();
      } catch (err) { alert("엑셀 분석 에러"); }
      finally { showLoading(false); document.getElementById('excelFile').value = ''; }
    };
    reader.readAsArrayBuffer(file);
  }

  function parseExcelDate(val) {
    if (!val) return "";
    if (typeof val === 'number') return new Date((val - 25569) * 86400000).toISOString().split('T')[0];
    const d = new Date(val); return isNaN(d.getTime()) ? "" : d.toISOString().split('T')[0];
  }

  function saveAll() {
    if (WEB_APP_URL.includes("여기에")) return alert("URL을 입력해주세요!");

    const data = [];
    document.querySelectorAll('#taskTableBody tr').forEach(row => {
      const inputs = row.querySelectorAll('input, select');
      if (inputs.length < 5) return; 
      
      const taskName = inputs[4].value.trim();
      if (!taskName) return;
      
      const status = inputs[1].value;
      data.push({
        priority: inputs[0].value,
        status: status,
        category: inputs[2].value.trim(),
        taskName: taskName,
        assignee: row.querySelector('.task-assignee').value,
        progress: status === '진행중' ? Number(row.querySelector('.prog-range').value) : (status === '완료' ? 100 : 0),
        startDate: inputs[8].value,
        endDate: inputs[9].value
      });
    });

    if (data.length === 0) return alert("저장할 업무가 없습니다.");

    showLoading(true, "구글 시트에 저장 중...");
    document.getElementById('saveBtn').disabled = true;

    fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    })
    .then(res => res.text())
    .then(result => { alert(result); loadData(); })
    .catch(err => alert("저장 실패: " + err.message))
    .finally(() => { showLoading(false); document.getElementById('saveBtn').disabled = false; });
  }
</script>

</body>
</html>
